name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  # ── Source archive ──────────────────────────────────────────────────────────
  source:
    name: Source archive
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create source archive
        run: |
          VER=${{ steps.ver.outputs.version }}
          tar --exclude='./target' --exclude='./.git' \
              -czf "forskscope-v${VER}.tar.gz" \
              --transform "s|^\./|forskscope-v${VER}/|" .

      - uses: actions/upload-artifact@v4
        with:
          name: source-archive
          path: forskscope-v*.tar.gz

  # ── Linux x86_64 ────────────────────────────────────────────────────────────
  linux:
    name: Linux x86_64
    runs-on: ubuntu-latest
    needs: source
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            pkg-config libssl-dev \
            libwebkit2gtk-4.1-dev libgtk-3-dev libxdo-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            target
          key: linux-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --locked -p forskscope-ui-dioxus

      - name: Package
        run: |
          VER=${{ needs.source.outputs.version }}
          tar -czf "forskscope-v${VER}-linux-x86_64.tar.gz" \
              -C target/release forskscope

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: forskscope-v*-linux-x86_64.tar.gz

  # ── macOS aarch64 ───────────────────────────────────────────────────────────
  macos:
    name: macOS aarch64
    runs-on: macos-14
    needs: source
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            target
          key: macos-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --locked -p forskscope-ui-dioxus

      - name: Package
        run: |
          VER=${{ needs.source.outputs.version }}
          zip -j "forskscope-v${VER}-macos-aarch64.zip" target/release/forskscope

      - uses: actions/upload-artifact@v4
        with:
          name: macos-aarch64
          path: forskscope-v*-macos-aarch64.zip

  # ── Windows x86_64 ──────────────────────────────────────────────────────────
  windows:
    name: Windows x86_64
    runs-on: windows-latest
    needs: source
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            target
          key: windows-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --locked -p forskscope-ui-dioxus

      - name: Package
        shell: bash
        run: |
          VER=${{ needs.source.outputs.version }}
          7z a "forskscope-v${VER}-windows-x64.zip" target/release/forskscope.exe

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: forskscope-v*-windows-x64.zip

  # ── Create GitHub release ───────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [source, linux, macos, windows]
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            forskscope-v*.tar.gz
            forskscope-v*-linux-x86_64.tar.gz
            forskscope-v*-macos-aarch64.zip
            forskscope-v*-windows-x64.zip
